<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thoughts</title>
    <meta
      name="description"
      content="A static archive wall of AI-generated thoughts."
    />
    <meta name="site-url" content="https://thoughts.vimal.works/" />
    <link rel="canonical" href="https://thoughts.vimal.works/" />
    <script src="./assets/vendor/html-to-image.min.js"></script>
    <script src="./assets/vendor/lucide.min.js"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <h1 class="site-title">Thoughts</h1>
      </header>

      <main aria-live="polite" aria-busy="true">
        <section class="status-panel" data-status hidden></section>
        <section
          class="grid"
          data-grid
          aria-label="Thought archive"
        ></section>
      </main>

      <div class="toast" data-toast hidden aria-live="polite" aria-atomic="true"></div>
    </div>

    <template id="thought-card-template">
      <article class="thought-card">
        <div class="thought-actions">
          <button
            class="card-action card-share"
            type="button"
            aria-label="Share thought"
            title="Share thought"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <i data-lucide="share-2"></i>
          </button>
          <div class="share-menu" role="menu" hidden>
            <button class="share-option" type="button" role="menuitem" data-platform="whatsapp">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    fill="currentColor"
                    d="M20.52 3.48A11.8 11.8 0 0 0 12.13 0C5.62 0 .3 5.3.3 11.82c0 2.08.54 4.12 1.57 5.92L0 24l6.46-1.69a11.8 11.8 0 0 0 5.67 1.45h.01c6.51 0 11.83-5.3 11.83-11.82 0-3.16-1.23-6.14-3.45-8.46Zm-8.39 18.3h-.01a9.8 9.8 0 0 1-4.99-1.37l-.36-.21-3.83 1 1.02-3.74-.24-.38a9.8 9.8 0 0 1-1.5-5.25c0-5.43 4.43-9.84 9.89-9.84 2.63 0 5.1 1.02 6.96 2.88a9.76 9.76 0 0 1 2.9 6.95c0 5.43-4.44 9.85-9.84 9.85Zm5.4-7.36c-.3-.15-1.77-.87-2.05-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.95 1.16-.17.2-.35.22-.65.08-.3-.15-1.25-.46-2.38-1.47-.88-.78-1.47-1.75-1.65-2.05-.17-.3-.02-.46.13-.61.14-.13.3-.35.45-.52.15-.18.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.62-.92-2.23-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.8.37-.27.3-1.05 1.03-1.05 2.52 0 1.48 1.08 2.91 1.23 3.11.15.2 2.11 3.22 5.11 4.52.72.31 1.28.5 1.71.64.72.23 1.38.2 1.9.12.58-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.35Z"
                  />
                </svg>
              </span>
              <span>WhatsApp</span>
            </button>
            <button class="share-option" type="button" role="menuitem" data-platform="x">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    fill="currentColor"
                    d="M18.901 1.153h3.68l-8.04 9.19L24 22.847h-7.406l-5.8-7.584-6.637 7.584H.48l8.6-9.83L0 1.154h7.594l5.243 6.932 6.064-6.933Zm-1.29 19.494h2.04L6.486 3.24H4.298l13.313 17.407Z"
                  />
                </svg>
              </span>
              <span>X</span>
            </button>
            <button class="share-option" type="button" role="menuitem" data-platform="threads">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    fill="currentColor"
                    d="M16.57 11.16c-.1-.08-.2-.16-.31-.24-.05-1.58-.42-2.79-1.12-3.61-.75-.88-1.88-1.33-3.36-1.33-1.42 0-2.58.43-3.45 1.28-.83.81-1.27 1.95-1.27 3.27 0 .17 0 .34.02.51h2.16a5.5 5.5 0 0 1-.03-.54c0-1.62.91-2.58 2.45-2.58.85 0 1.45.22 1.81.66.3.36.5.92.58 1.67a7.48 7.48 0 0 0-2.87.66c-1.55.75-2.34 2-2.34 3.72 0 1.77 1.37 3.08 3.25 3.08 1.26 0 2.27-.39 3-1.15-.49 1.15-1.6 1.76-3.25 1.76-2.5 0-4.06-1.64-4.06-4.27 0-2.76 1.65-4.47 4.31-4.47 1.37 0 2.41.31 3.16.94.54.45.95 1.06 1.25 1.83l2-.53c-.38-1.18-.99-2.1-1.83-2.78-.98-.79-2.25-1.19-3.79-1.19-1.92 0-3.48.6-4.63 1.79-1.11 1.14-1.69 2.68-1.69 4.46 0 1.76.58 3.24 1.67 4.3 1.11 1.07 2.6 1.62 4.43 1.62 1.88 0 3.37-.53 4.43-1.57 1.02-1 1.56-2.38 1.56-3.99 0-1.53-.51-2.83-1.48-3.76Zm-4.4 4.62c-.78 0-1.3-.43-1.3-1.08 0-.57.26-.99.82-1.29.44-.23 1.11-.39 2.02-.46-.15 1.86-.69 2.83-1.54 2.83Z"
                  />
                </svg>
              </span>
              <span>Threads</span>
            </button>
            <button class="share-option" type="button" role="menuitem" data-platform="linkedin">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    fill="currentColor"
                    d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.95v5.66H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.38-1.85 3.61 0 4.27 2.38 4.27 5.48v6.26ZM5.32 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14ZM7.1 20.45H3.54V9H7.1v11.45ZM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.8 24 1.77 24h20.46c.98 0 1.77-.77 1.77-1.72V1.72C24 .77 23.2 0 22.23 0Z"
                  />
                </svg>
              </span>
              <span>LinkedIn</span>
            </button>
            <button class="share-option" type="button" role="menuitem" data-platform="email">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    fill="currentColor"
                    d="M1.5 4.5h21a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-21a1 1 0 0 1-1-1v-13a1 1 0 0 1 1-1Zm19.38 2H3.12L12 13.1l8.88-6.6Zm.62 10.76V8.42l-9.2 6.84a.5.5 0 0 1-.6 0L2.5 8.42v8.84h19Z"
                  />
                </svg>
              </span>
              <span>Email</span>
            </button>
          </div>
        </div>
        <p class="thought-text"></p>
        <div class="thought-footer">
          <div class="thought-meta">
            <time class="thought-date"></time>
            <a
              class="thought-link"
              href="https://thoughts.vimal.works/"
              target="_blank"
              rel="noopener noreferrer"
            >
              thoughts.vimal.works
            </a>
          </div>
          <button
            class="card-action card-download"
            type="button"
            aria-label="Download thought"
            title="Download thought"
          >
            <i data-lucide="download"></i>
          </button>
        </div>
      </article>
    </template>

    <script src="./script.js" defer></script>
  </body>
</html>
