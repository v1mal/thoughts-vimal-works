<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thoughts by Vimal Kandoth</title>
    <meta
      name="description"
      content="A living archive of short philosophical thoughts, published throughout the day. A quiet experiment in thinking out loud. AI-assisted, human-curated."
    />
    <meta
      name="keywords"
      content="philosophical prose, daily thoughts, original thinking, AI-assisted writing, minimalist archive, vimal.works, vimal kandoth"
    />
    <meta name="site-url" content="https://thoughts.vimal.works/" />
    <link rel="canonical" href="https://thoughts.vimal.works/" />
    <meta property="og:title" content="Thoughts by Vimal Kandoth" />
    <meta
      property="og:description"
      content="A living archive of short philosophical thoughts, published throughout the day. A quiet experiment in thinking out loud. AI-assisted, human-curated."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thoughts.vimal.works/" />
    <meta property="og:site_name" content="Thoughts by Vimal Kandoth" />
    <meta property="og:image" content="https://thoughts.vimal.works/og-image.jpg" />
    <meta property="og:image:alt" content="Thoughts by Vimal Kandoth" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Thoughts by Vimal Kandoth" />
    <meta
      name="twitter:description"
      content="A living archive of short philosophical thoughts, published throughout the day. A quiet experiment in thinking out loud. AI-assisted, human-curated."
    />
    <meta name="twitter:image" content="https://thoughts.vimal.works/og-image.jpg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <h1 class="site-title">Thoughts</h1>
      </header>

      <main aria-live="polite" aria-busy="true">
        <section class="status-panel" data-status hidden></section>
        <section
          class="grid"
          data-grid
          aria-label="Thought archive"
        ></section>
      </main>

      <div class="toast" data-toast hidden aria-live="polite" aria-atomic="true"></div>

      <div class="thought-modal-overlay" data-thought-modal hidden>
        <button
          class="thought-modal-close"
          type="button"
          aria-label="Close thought"
          title="Close thought"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>

        <div
          class="thought-modal"
          role="dialog"
          aria-modal="true"
          aria-labelledby="thought-modal-text"
        >
          <div class="thought-modal-body">
            <p class="thought-modal-text" id="thought-modal-text"></p>

            <div class="thought-modal-footer">
              <div class="thought-modal-meta">
                <time class="thought-modal-date"></time>
                <a
                  class="thought-modal-link"
                  href="https://thoughts.vimal.works/"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  thoughts.vimal.works
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <template id="thought-card-template">
      <article class="thought-card">
        <div class="thought-actions">
          <button
            class="card-action card-share"
            type="button"
            aria-label="Share thought"
            title="Share thought"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.1">
              <circle cx="18" cy="5" r="3"></circle>
              <circle cx="6" cy="12" r="3"></circle>
              <circle cx="18" cy="19" r="3"></circle>
              <path d="m8.59 13.51 6.83 3.98"></path>
              <path d="m15.41 7.51-6.82 3.98"></path>
            </svg>
          </button>
          <div class="share-menu" role="menu" hidden>
            <button class="share-option" type="button" role="menuitem" data-platform="whatsapp">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                  <path d="M21 11.5a8.38 8.38 0 0 1-12.68 7.18L3 20l1.39-5.09A8.5 8.5 0 1 1 21 11.5z"></path>
                  <path d="M8.9 9.2c.2-.5.4-.5.6-.5h.5c.2 0 .4 0 .5.3.2.4.7 1.7.8 1.9.1.2.1.4 0 .6s-.2.3-.4.5c-.1.1-.3.3-.4.4-.2.1-.3.3-.1.6.2.3.7 1.2 1.6 1.9 1 .8 1.9 1.1 2.2 1.2.3.1.5.1.7-.1.2-.2.7-.8.9-1.1.2-.2.4-.2.6-.1.2.1 1.5.7 1.8.8.3.1.5.2.5.3 0 .1 0 .8-.3 1.2-.3.4-1.5 1.3-3.4 1.1-1.8-.2-4-1.6-5.3-2.8-1.3-1.2-2.3-2.8-2.5-3.2-.2-.5-.8-1.7-.1-2.8.2-.3.4-.5.6-.7.2-.2.3-.3.4-.5.1-.2.1-.4 0-.5-.1-.1-.4-.9-.5-1.3-.1-.4-.3-.4-.5-.4h-.4c-.2 0-.5.1-.7.4-.2.3-.8.9-.8 2.1"></path>
                </svg>
              </span>
              <span>WhatsApp</span>
            </button>
            <button class="share-option" type="button" role="menuitem" data-platform="x">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                  <path d="M18 6 6 18"></path>
                  <path d="m6 6 12 12"></path>
                </svg>
              </span>
              <span>X</span>
            </button>
            <button class="share-option" type="button" role="menuitem" data-platform="threads">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                  <circle cx="12" cy="12" r="4"></circle>
                  <path d="M16 8.5V9a3 3 0 1 1-3 3"></path>
                  <path d="M8 15.5A6.5 6.5 0 1 1 16 8"></path>
                </svg>
              </span>
              <span>Threads</span>
            </button>
            <button class="share-option" type="button" role="menuitem" data-platform="copy-link">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                  <path d="M10 13a5 5 0 0 0 7.54.54l1.92-1.91a5 5 0 0 0-7.07-7.08L11.3 5.63"></path>
                  <path d="M14 11a5 5 0 0 0-7.54-.54L4.54 12.37a5 5 0 0 0 7.07 7.08l1.89-1.89"></path>
                </svg>
              </span>
              <span>Copy link</span>
            </button>
            <button class="share-option" type="button" role="menuitem" data-platform="linkedin">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                  <rect x="2" y="2" width="20" height="20" rx="2"></rect>
                  <path d="M7 10v7"></path>
                  <path d="M7 7h.01"></path>
                  <path d="M11 17v-4"></path>
                  <path d="M11 13a2 2 0 0 1 4 0v4"></path>
                </svg>
              </span>
              <span>LinkedIn</span>
            </button>
            <button class="share-option" type="button" role="menuitem" data-platform="email">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                  <path d="M4 4h16v16H4z"></path>
                  <path d="m4 7 8 6 8-6"></path>
                </svg>
              </span>
              <span>Email</span>
            </button>
          </div>
        </div>
        <p class="thought-text"></p>
        <div class="thought-footer">
          <div class="thought-meta">
            <time class="thought-date"></time>
            <a
              class="thought-link"
              href="https://thoughts.vimal.works/"
              target="_blank"
              rel="noopener noreferrer"
            >
              thoughts.vimal.works
            </a>
          </div>
          <button
            class="card-action card-download"
            type="button"
            aria-label="Download thought"
            title="Download thought"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.1">
              <path d="M12 3v12"></path>
              <path d="m7 10 5 5 5-5"></path>
              <path d="M5 21h14"></path>
            </svg>
          </button>
        </div>
      </article>
    </template>

    <script src="./script.js" defer></script>
  </body>
</html>
